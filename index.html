<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HR GAMING Zone</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #0f172a, #020617);
      color: white;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: url('https://wallpapercave.com/wp/wp5128415.jpg') repeat;
      opacity: 0.08;
      animation: moveBg 60s linear infinite;
      z-index: -1;
    }

    @keyframes moveBg {
      0% { transform: translate(0,0); }
      100% { transform: translate(-50%, -50%); }
    }

    header {
      background: rgba(2, 6, 23, 0.9);
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #22c55e;
      box-shadow: 0 0 20px #22c55e;
    }

    header h1 {
      color: #22c55e;
      font-size: 45px;
      text-shadow: 0 0 10px #22c55e;
    }

    nav {
      background: rgba(2,6,23,0.8);
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 15px;
      text-decoration: none;
      font-weight: bold;
      text-shadow: 0 0 5px #22c55e;
    }

    nav a:hover {
      color: #22c55e;
      text-shadow: 0 0 20px #22c55e;
    }

    .hero {
      padding: 80px 20px;
      text-align: center;
    }

    .hero h2 {
      font-size: 40px;
      color: #22c55e;
    }

    .insta-btn {
      display: inline-flex;
      align-items: center;
      margin-top: 20px;
      padding: 10px 20px;
      background: #e1306c;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }

    .insta-btn img {
      width: 25px;
      margin-right: 10px;
    }

    .games {
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 40px 20px;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(2,6,23,0.85);
      padding: 20px;
      border-radius: 15px;
      width: 220px;
      box-shadow: 0 0 15px #22c55e;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 0 30px #22c55e;
    }

    .card img {
      width: 100%;
      height: 130px;
      border-radius: 10px;
      object-fit: cover;
      margin-bottom: 10px;
    }

    .contact-card {
      background: rgba(34, 197, 94, 0.1);
      border: 2px solid #22c55e;
      box-shadow: 0 0 20px #22c55e;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      width: 300px;
      margin: 40px auto;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(2,6,23,0.9);
      border-top: 2px solid #22c55e;
    }

    @media (max-width: 768px) {
      .games {
        flex-direction: column;
        align-items: center;
      }

      .card {
        width: 80%;
      }

      .contact-card {
        width: 80%;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>🎮 HR GAMING</h1>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Games</a>
  <a href="#">Contact</a>
</nav>

<div class="hero">
  <h2>Welcome Gamer 🔥</h2>
<H3>Created by Himanshu Rawat</
H3>
  <p>The ultimate zone for gaming lovers</p>

  <a href="https://instagram.com/himanshurawat_20" target="_blank" class="insta-btn">
    <img src="https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png">
    Follow me
  </a>
</div>

<div class="games">
  <div class="card">
    <img src="https://wallpapercave.com/wp/wp5128415.jpg">
    <h3>Free Fire</h3>
    <p>Battle Royale Game</p>
  </div>

  <div class="card">
    <img src="https://wallpapercave.com/wp/wp1812483.jpg">
    <h3>Clash of Clans</h3>
    <p>Strategy War Game</p>
  </div>
</div>

<div class="contact-card">
  <h3>Contact Me</h3>
  <p>Email: himanshurawat20@gmail.com</p>
  <p>Instagram: @himanshurawat_20</p>
</div>

<footer>
  <p>© 2026 HR GAMING Zone</p>
</footer>

</body>
</html>
